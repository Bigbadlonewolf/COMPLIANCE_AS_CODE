name: OPA Policy Unit Tests

on:
  push:
    branches: [main]
    paths:
      - "policies/**"
      - "tests/**"
  pull_request:
    paths:
      - "policies/**"
      - "tests/**"

jobs:
  unit-tests:
    name: Run OPA unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OPA v1.0
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://github.com/open-policy-agent/opa/releases/download/v1.0.0/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Run all unit tests (deny + allow paths)
        run: |
          opa test policies/ tests/pci_dss/ tests/soc2/ tests/nist_800_53/ \
            --verbose \
            --count=1 \
            --format=pretty

      - name: Check policy syntax (opa check)
        run: |
          opa check policies/ --strict
