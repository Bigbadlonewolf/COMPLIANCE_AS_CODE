name: policy-check

on:
  pull_request:
    paths:
      - "terraform/**"
      - "examples/terraform/**"
      - "policies/**"
  push:
    branches: [main]

jobs:
  opa-unit-tests:
    name: OPA policy unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: Run policy unit tests
        run: opa test policies/ tests/pci_dss/ tests/soc2/ tests/nist_800_53/ -v

  conftest-noncompliant-must-fail:
    name: Conftest must REJECT the noncompliant example
    runs-on: ubuntu-latest
    needs: opa-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install conftest
        run: |
          curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

      # This step is EXPECTED to fail. If it passes, the policies are broken.
      - name: Conftest should reject this plan
        working-directory: examples/terraform/noncompliant
        run: |
          set +e
          conftest test plan.json --policy ../../../policies --all-namespaces
          result=$?
          set -e
          if [ $result -eq 0 ]; then
            echo "::error::Conftest passed on a deliberately non-compliant plan. Policies are not catching known violations."
            exit 1
          fi
          echo "Confirmed: policies correctly rejected the non-compliant plan."

  conftest-compliant-must-pass:
    name: Conftest must ACCEPT the compliant example
    runs-on: ubuntu-latest
    needs: opa-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install conftest
        run: |
          curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Conftest should accept this plan
        working-directory: examples/terraform/compliant
        run: conftest test plan.json --policy ../../../policies --all-namespaces
