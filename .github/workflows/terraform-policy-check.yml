name: Terraform Policy Compliance Check

on:
  push:
    branches: [main]
    paths:
      - "policies/**"
      - "tests/fixtures/**"
      - "terraform/**"
  pull_request:
    paths:
      - "policies/**"
      - "tests/fixtures/**"
      - "terraform/**"

env:
  OPA_VERSION: "1.0.0"

jobs:
  # ── Job 0: OPA unit tests must pass before any fixture checks ───────────────
  opa-unit-tests:
    name: OPA policy unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://github.com/open-policy-agent/opa/releases/download/v${{ env.OPA_VERSION }}/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Run all unit tests
        run: |
          opa test policies/ tests/pci_dss/ tests/soc2/ tests/nist_800_53/ \
            --verbose \
            --count=1 \
            --format=pretty

      - name: Check policy syntax
        run: opa check policies/ --strict

  # ── Job 1: Noncompliant fixture must produce violations ─────────────────────
  check-noncompliant:
    name: Verify noncompliant config triggers violations
    runs-on: ubuntu-latest
    needs: opa-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://github.com/open-policy-agent/opa/releases/download/v${{ env.OPA_VERSION }}/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Collect all deny violations from noncompliant fixture
        id: violations
        run: |
          PCI=$(opa eval --data policies/ --input tests/fixtures/noncompliant.tfplan.json \
            --format raw 'count([m | m := data.pci_dss[_].deny[_]])')
          SOC=$(opa eval --data policies/ --input tests/fixtures/noncompliant.tfplan.json \
            --format raw 'count([m | m := data.soc2[_].deny[_]])')
          NIST=$(opa eval --data policies/ --input tests/fixtures/noncompliant.tfplan.json \
            --format raw 'count([m | m := data.nist_800_53[_].deny[_]])')

          echo "PCI DSS violations: $PCI"
          echo "SOC2 violations:    $SOC"
          echo "NIST 800-53:        $NIST"

          COUNT=$((PCI + SOC + NIST))
          echo "Total violations: $COUNT"
          echo "violation_count=$COUNT" >> "$GITHUB_OUTPUT"

          [ "$COUNT" -gt 0 ] || (echo "ERROR: noncompliant fixture produced 0 violations" && exit 1)

      - name: Print violation summary
        run: |
          echo "### Noncompliant violations detected: ${{ steps.violations.outputs.violation_count }}" >> "$GITHUB_STEP_SUMMARY"
          opa eval \
            --data policies/ \
            --input tests/fixtures/noncompliant.tfplan.json \
            --format pretty \
            '[m | m := data.pci_dss[_].deny[_]]' | head -80 >> "$GITHUB_STEP_SUMMARY" || true

  # ── Job 2: Compliant fixture must produce zero violations ───────────────────
  check-compliant:
    name: Verify compliant config passes all policies
    runs-on: ubuntu-latest
    needs: opa-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://github.com/open-policy-agent/opa/releases/download/v${{ env.OPA_VERSION }}/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Verify zero violations from compliant fixture
        run: |
          PCI=$(opa eval \
            --data policies/ \
            --input tests/fixtures/compliant.tfplan.json \
            --format raw \
            'count([m | m := data.pci_dss[_].deny[_]])')

          SOC=$(opa eval \
            --data policies/ \
            --input tests/fixtures/compliant.tfplan.json \
            --format raw \
            'count([m | m := data.soc2[_].deny[_]])')

          NIST=$(opa eval \
            --data policies/ \
            --input tests/fixtures/compliant.tfplan.json \
            --format raw \
            'count([m | m := data.nist_800_53[_].deny[_]])')

          echo "PCI DSS violations: $PCI"
          echo "SOC2 violations:    $SOC"
          echo "NIST 800-53:        $NIST"

          TOTAL=$((PCI + SOC + NIST))
          echo "Total: $TOTAL"

          [ "$TOTAL" -eq 0 ] || (echo "ERROR: compliant fixture has $TOTAL unexpected violations" && exit 1)

      - name: Confirm clean pass
        run: |
          echo "### Compliant fixture: 0 violations across PCI DSS / SOC2 / NIST 800-53 ✅" >> "$GITHUB_STEP_SUMMARY"
